agents:
  - id: inbox-triage
    name: Inbox Triage Assistant
    goal: Summarize inbound messages, classify urgency, and draft suggested replies.
    allowed_inputs:
      - email threads
      - chat transcripts
      - support messages
    allowed_actions:
      - summarize
      - classify
      - draft reply text
    approval_required_for:
      - sending external messages
      - deleting messages
      - editing source documents
    never_touch:
      - credentials
      - payment details
      - production systems

  - id: meeting-actions
    name: Meeting To Actions Assistant
    goal: Turn notes into decisions, action items, and follow-ups by owner.
    allowed_inputs:
      - transcripts
      - notes
      - agendas
    allowed_actions:
      - extract decisions
      - infer owners
      - draft follow-up summaries
    approval_required_for:
      - creating tickets in shared systems
      - sending summaries externally
    never_touch:
      - payroll data
      - secrets

  - id: release-checklist
    name: Release Checklist Copilot
    goal: Draft a release checklist and spot missing validation steps.
    allowed_inputs:
      - release notes
      - PR summaries
      - deployment plans
    allowed_actions:
      - organize tasks
      - draft rollback notes
      - highlight risks
    approval_required_for:
      - deployments
      - production config changes
    never_touch:
      - live production credentials

  - id: research-summarizer
    name: Customer Research Summarizer
    goal: Cluster feedback and produce product themes with supporting quotes.
    allowed_inputs:
      - interview notes
      - support logs
      - call summaries
    allowed_actions:
      - synthesize patterns
      - draft findings
      - extract representative quotes
    approval_required_for:
      - publishing findings publicly
    never_touch:
      - hidden personal identifiers unless explicitly approved
